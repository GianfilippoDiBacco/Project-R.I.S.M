<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  // Cloud Configuration
  const SUPABASE_URL = 'https://qlbcxutceqeomxldliue.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFsYmN4dXRjZXFlb214bGRsaXVlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNDY3MTgsImV4cCI6MjA5MTgyMjcxOH0.5DBDrXqvRILPOI0y4LJuGkqRG6tkye0s-1_KGbYDxUE';
  
  const MAX = 10000;
  let sb;
  let state = {
    gianfy: 0,
    edo: 0,
    logs: [] // We'll share the log globally too
  };

  // 2. Initialize and Sync
  async function init() {
    try {
      sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      // Load initial data from "rism_state" row
      const { data, error } = await sb.from('rng_state').select('data').eq('id', 'rism_global').single();
      
      if (data) {
        state = data.data;
      } else {
        // Create the row if it doesn't exist yet
        await sb.from('rng_state').insert([{ id: 'rism_global', data: state }]);
      }

      refreshUI();

      // 3. Listen for Real-time updates from other devices
      sb.channel('rism-changes')
        .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'rng_state', filter: 'id=eq.rism_global' }, payload => {
          state = payload.new.data;
          refreshUI();
        })
        .subscribe();

    } catch (err) {
      console.error("Connection failed:", err);
    }
  }

  function refreshUI() {
    updateUI('gianfy');
    updateUI('edo');
    renderLogs();
  }

  function updateUI(person) {
    const val = Math.min(state[person], MAX);
    const pct = (val / MAX) * 100;
    document.getElementById(`${person}-val`).textContent  = '€' + val.toLocaleString('it-IT');
    document.getElementById(`${person}-fill`).style.width = pct + '%';
    document.getElementById(`${person}-pct`).textContent  = pct.toFixed(1) + '%';
  }

  function renderLogs() {
    ['gianfy', 'edo'].forEach(person => {
      const logContainer = document.getElementById(`${person}-log`);
      logContainer.innerHTML = ''; // Clear current
      
      // Filter logs for this specific person
      const personLogs = state.logs.filter(l => l.user === person).slice(0, 10);
      
      personLogs.forEach(l => {
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.innerHTML = `[${l.time}] <span>+€${l.amount.toLocaleString('it-IT')}</span> added`;
        logContainer.appendChild(entry);
      });
    });
  }

  async function apply(person, amount) {
    if (state[person] >= MAX) return;

    // Update local state
    state[person] = Math.min(state[person] + amount, MAX);
    
    // Add to shared log
    const time = new Date().toLocaleTimeString('it-IT', {hour:'2-digit', minute:'2-digit'});
    state.logs.unshift({ user: person, amount: amount, time: time });
    if (state.logs.length > 50) state.logs.pop(); // Keep log slim

    // Push to Cloud
    await sb.from('rng_state').update({ data: state }).eq('id', 'rism_global');
    
    refreshUI();
    if (state[person] >= MAX) celebrate(person);
  }

  // UI Helper Functions
  function addMoney(person) {
    const input = document.getElementById(`${person}-input`);
    const amount = parseInt(input.value);
    if (!amount || amount <= 0) return;
    apply(person, amount);
    input.value = '';
  }

  function quickAdd(person, amount) {
    apply(person, amount);
  }

  function celebrate(person) {
    document.getElementById('cel-name').textContent = person.toUpperCase();
    document.getElementById('cel-name').style.color =
      person === 'gianfy' ? 'var(--accent-g)' : 'var(--accent-e)';
    document.getElementById('celebration').classList.add('active');
    launchConfetti();
  }

  function closeCelebration() {
    document.getElementById('celebration').classList.remove('active');
    document.getElementById('confetti-container').innerHTML = '';
  }

  function launchConfetti() {
    const container = document.getElementById('confetti-container');
    container.innerHTML = '';
    const colors = ['#00e5a0','#ff5f6d','#f5c542','#ffffff'];
    for (let i = 0; i < 120; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      const color = colors[Math.floor(Math.random() * colors.length)];
      el.style.cssText = `
        left:${Math.random() * 100}vw; background:${color}; 
        width:${6+Math.random()*8}px; height:${6+Math.random()*8}px;
        --drift:${(Math.random() - 0.5) * 200}px;
        animation-duration:${2.5+Math.random()*2}s; 
        animation-delay:${Math.random()*1.5}s;
      `;
      container.appendChild(el);
    }
  }

  // Handle Enter Key
  ['gianfy','edo'].forEach(p => {
    document.getElementById(`${p}-input`).addEventListener('keydown', e => {
      if (e.key === 'Enter') addMoney(p);
    });
  });

  // Start the App
  window.onload = init;
</script>
