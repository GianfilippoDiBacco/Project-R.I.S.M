<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project RISM | Sudden Death</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ... (Same CSS as before for the aesthetic) ... */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0a0a0f; --surface: #111118; --border: #1e1e2e; --accent-g: #00e5a0; --accent-e: #ff5f6d; --text: #e8e8f0; --muted: #555570; --gold: #f5c542; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 48px 24px; }
    header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 80px; letter-spacing: 0.08em; background: linear-gradient(135deg, #fff 30%, var(--muted)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center;}
    #global-timer { text-align: center; margin-top: 10px; color: var(--gold); letter-spacing: 0.2em; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 32px; width: 100%; max-width: 900px; margin-top: 40px; }
    .card { background: var(--surface); border: 1px solid var(--border); padding: 36px 32px; position: relative; }
    .card.gianfy::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--accent-g); }
    .card.edo::before    { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--accent-e); }
    .name { font-family: 'Bebas Neue', sans-serif; font-size: 36px; }
    .amount-value { font-size: 28px; font-weight: 500; }
    .progress-wrap { background: var(--border); height: 8px; margin: 20px 0; overflow: hidden; }
    .progress-fill { height: 100%; width: 0%; transition: width 1.2s cubic-bezier(0.22, 1, 0.36, 1); }
    .card.gianfy .progress-fill { background: var(--accent-g); box-shadow: 0 0 10px var(--accent-g); }
    .card.edo    .progress-fill { background: var(--accent-e); box-shadow: 0 0 10px var(--accent-e); }
    .input-row { display: flex; gap: 8px; }
    .money-input { flex: 1; background: var(--bg); border: 1px solid var(--border); color: #fff; padding: 10px; font-family: inherit; }
    .add-btn { background: transparent; border: 1px solid var(--border); color: #fff; padding: 10px; cursor: pointer; }
    
    /* Celebration - Fixed Z-index */
    .celebration { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; text-align: center; }
    .celebration.active { display: flex; }
    .cel-name { font-family: 'Bebas Neue', sans-serif; font-size: 120px; line-height: 1; margin: 20px 0; }
    #reset-btn { margin-top: 50px; background: transparent; border: 1px solid #333; color: #444; padding: 10px; cursor: pointer; }
  </style>
</head>
<body>

<header>
  <h1>PROJECT RISM</h1>
  <div id="global-timer">SYNCING SATELLITE...</div>
</header>

<div class="cards">
  <div class="card gianfy">
    <div class="name" style="color:var(--accent-g)">GIANFY</div>
    <div class="amount-value" id="gianfy-val">€0</div>
    <div class="progress-wrap"><div class="progress-fill" id="gianfy-fill"></div></div>
    <div class="input-row">
      <input class="money-input" id="gianfy-input" type="number" placeholder="€..." />
      <button class="add-btn" onclick="addMoney('gianfy')">DEPOSIT</button>
    </div>
  </div>

  <div class="card edo">
    <div class="name" style="color:var(--accent-e)">EDO</div>
    <div class="amount-value" id="edo-val">€0</div>
    <div class="progress-wrap"><div class="progress-fill" id="edo-fill"></div></div>
    <div class="input-row">
      <input class="money-input" id="edo-input" type="number" placeholder="€..." />
      <button class="add-btn" onclick="addMoney('edo')">DEPOSIT</button>
    </div>
  </div>
</div>

<div class="celebration" id="celebration">
    <div style="color:var(--gold); letter-spacing:5px;">TERMINAL LOCKDOWN</div>
    <div class="cel-name" id="cel-name">WINNER</div>
    <div style="color:var(--muted)">TARGET REACHED: €10.000 SECURED</div>
    <button id="reset-btn" onclick="fullReset()">REBOOT SYSTEM (RESET)</button>
</div>

<script>
  const SUPABASE_URL = 'https://qlbcxutceqeomxldliue.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFsYmN4dXRjZXFlb214bGRsaXVlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNDY3MTgsImV4cCI6MjA5MTgyMjcxOH0.5DBDrXqvRILPOI0y4LJuGkqRG6tkye0s-1_KGbYDxUE';
  
  const MAX = 10000;
  let sb, state = { gianfy: 0, edo: 0, logs: [], deadline: null, winner: null };

  async function init() {
    sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const { data } = await sb.from('rng_state').select('data').eq('id', 'rism_global').single();
    if (data) { state = data.data; refreshUI(); }
    
    sb.channel('rism').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'rng_state', filter: 'id=eq.rism_global' }, payload => {
      state = payload.new.data; 
      refreshUI();
    }).subscribe();
  }

  function refreshUI() {
    // Check for winner first
    if (state.winner) {
        document.getElementById('cel-name').innerText = state.winner.toUpperCase();
        document.getElementById('cel-name').style.color = state.winner === 'gianfy' ? 'var(--accent-g)' : 'var(--accent-e)';
        document.getElementById('celebration').classList.add('active');
    } else {
        document.getElementById('celebration').classList.remove('active');
    }

    ['gianfy', 'edo'].forEach(p => {
      const val = state[p] || 0;
      const pct = Math.min((val / MAX) * 100, 100);
      document.getElementById(`${p}-val`).innerText = `€${val.toLocaleString('it-IT')}`;
      document.getElementById(`${p}-fill`).style.width = pct + '%';
    });
  }

  async function addMoney(p) {
    if (state.winner) return;
    const input = document.getElementById(`${p}-input`);
    const val = parseInt(input.value);
    if (!val || val <= 0) return;
    
    if (!state.deadline) state.deadline = Date.now() + (6 * 30 * 24 * 60 * 60 * 1000);
    
    state[p] += val;
    state.logs.unshift({ user: p, amount: val, time: new Date().toLocaleTimeString() });
    
    // SUDDEN DEATH CHECK
    if (state[p] >= MAX) {
        state[p] = MAX; // Cap it
        state.winner = p;
    }

    refreshUI(); // Update UI immediately for the clicker
    input.value = '';
    
    // Push to Supabase
    const { error } = await sb.from('rng_state').update({ data: state }).eq('id', 'rism_global');
    if (error) console.error("Update failed:", error);
  }

  async function fullReset() {
    if (confirm("System Reboot? This clears all cloud data.")) {
        state = { gianfy: 0, edo: 0, logs: [], deadline: null, winner: null };
        refreshUI();
        await sb.from('rng_state').update({ data: state }).eq('id', 'rism_global');
    }
  }

  function updateTimer() {
    const el = document.getElementById('global-timer');
    if (state.winner) { el.innerHTML = "SYSTEM LOCKED: WINNER CONFIRMED"; return; }
    if (!state.deadline) { el.innerHTML = "AWAITING INITIAL DEPOSIT"; return; }
    const diff = state.deadline - Date.now();
    if (diff <= 0) { el.innerHTML = "TIME EXPIRED"; return; }
    const d = Math.floor(diff / (1000 * 60 * 60 * 24));
    const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
    el.innerHTML = `T-MINUS: ${d}D ${h}H`;
  }

  window.onload = () => { init(); setInterval(updateTimer, 1000); };
</script>
</body>
</html>
