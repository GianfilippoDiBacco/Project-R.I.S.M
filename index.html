<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project RISM - Cloud Edition</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f; --surface: #111118; --border: #1e1e2e;
      --accent-g: #00e5a0; --accent-e: #ff5f6d;
      --text: #e8e8f0; --muted: #555570; --gold: #f5c542;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'DM Mono', monospace; padding: 40px 20px;
      display: flex; flex-direction: column; align-items: center;
    }
    header { text-align: center; margin-bottom: 40px; }
    h1 { font-family: 'Bebas Neue', sans-serif; font-size: 4rem; letter-spacing: 4px; margin: 0; }
    #global-timer { color: var(--gold); font-size: 1.2rem; margin-top: 10px; font-weight: 500; }
    
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; width: 100%; max-width: 900px; }
    .card { background: var(--surface); border: 1px solid var(--border); padding: 25px; border-radius: 4px; }
    
    .progress-container { background: #000; height: 12px; border-radius: 6px; margin: 20px 0; overflow: hidden; }
    .progress-fill { height: 100%; width: 0%; transition: width 1s cubic-bezier(0.1, 0, 0, 1); }
    .g-fill { background: var(--accent-g); box-shadow: 0 0 15px var(--accent-g); }
    .e-fill { background: var(--accent-e); box-shadow: 0 0 15px var(--accent-e); }

    input { background: #000; border: 1px solid var(--border); color: #fff; padding: 10px; width: 100%; margin-bottom: 10px; font-family: inherit; }
    .btn { cursor: pointer; border: 1px solid var(--border); padding: 10px; background: transparent; color: var(--text); font-family: inherit; transition: 0.2s; }
    .btn:hover { background: #fff; color: #000; }
    
    .log { margin-top: 20px; font-size: 0.8rem; color: var(--muted); height: 100px; overflow-y: auto; }
    .log-entry span { color: #fff; font-weight: bold; }
    
    #reset-btn { margin-top: 100px; color: var(--muted); font-size: 10px; border: 1px solid var(--muted); padding: 5px 10px; cursor: pointer; background: transparent; }
  </style>
</head>
<body>

  <header>
    <p style="color:var(--muted); letter-spacing: 5px;">PROJECT</p>
    <h1>RISM</h1>
    <div id="global-timer">CONNECTING TO CLOUD...</div>
  </header>

  <div class="cards">
    <div class="card">
      <h2 style="color:var(--accent-g)">GIANFY</h2>
      <div id="gianfy-val" style="font-size: 2rem;">€0</div>
      <div class="progress-container"><div id="gianfy-fill" class="progress-fill g-fill"></div></div>
      <p id="gianfy-pct" style="color:var(--muted)">0%</p>
      <input type="number" id="gianfy-input" placeholder="Amount...">
      <button class="btn" onclick="addMoney('gianfy')">ADD FUNDS</button>
      <div id="gianfy-log" class="log"></div>
    </div>

    <div class="card">
      <h2 style="color:var(--accent-e)">EDO</h2>
      <div id="edo-val" style="font-size: 2rem;">€0</div>
      <div class="progress-container"><div id="edo-fill" class="progress-fill e-fill"></div></div>
      <p id="edo-pct" style="color:var(--muted)">0%</p>
      <input type="number" id="edo-input" placeholder="Amount...">
      <button class="btn" onclick="addMoney('edo')">ADD FUNDS</button>
      <div id="edo-log" class="log"></div>
    </div>
  </div>

  <button id="reset-btn" onclick="fullReset()">SYSTEM RESET</button>

  <script>
    const SUPABASE_URL = 'https://qlbcxutceqeomxldliue.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFsYmN4dXRjZXFlb214bGRsaXVlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNDY3MTgsImV4cCI6MjA5MTgyMjcxOH0.5DBDrXqvRILPOI0y4LJuGkqRG6tkye0s-1_KGbYDxUE';
    
    const MAX = 10000;
    let sb, state = { gianfy: 0, edo: 0, logs: [], deadline: null };

    async function init() {
      sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      const { data } = await sb.from('rng_state').select('data').eq('id', 'rism_global').single();
      if (data) state = data.data;
      
      refreshUI();
      setInterval(updateTimer, 1000);

      sb.channel('rism').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'rng_state', filter: 'id=eq.rism_global' }, payload => {
        state = payload.new.data;
        refreshUI();
      }).subscribe();
    }

    function updateTimer() {
      const el = document.getElementById('global-timer');
      if (!state.deadline) { el.innerHTML = "WAITING FOR FIRST DEPOSIT"; return; }
      
      const diff = state.deadline - Date.now();
      if (diff < 0) {
        const win = state.gianfy > state.edo ? "GIANFY" : "EDO";
        el.innerHTML = `CHALLENGE OVER: ${win} WINS`;
        return;
      }
      
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hrs = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const mins = Math.floor((diff / 1000 / 60) % 60);
      el.innerHTML = `${days}d ${hrs}h ${mins}m REMAINING`;
    }

    async function addMoney(p) {
      const val = parseInt(document.getElementById(`${p}-input`).value);
      if (!val || val <= 0) return;

      if (!state.deadline) state.deadline = Date.now() + (6 * 30 * 24 * 60 * 60 * 1000);
      
      state[p] += val;
      state.logs.unshift({ user: p, amount: val, time: new Date().toLocaleTimeString() });
      await sb.from('rng_state').update({ data: state }).eq('id', 'rism_global');
      document.getElementById(`${p}-input`).value = '';
    }

    async function fullReset() {
      if (prompt('Type: I want to reset') === "I want to reset") {
        state = { gianfy: 0, edo: 0, logs: [], deadline: null };
        await sb.from('rng_state').update({ data: state }).eq('id', 'rism_global');
      }
    }

    function refreshUI() {
      ['gianfy', 'edo'].forEach(p => {
        const pct = Math.min((state[p] / MAX) * 100, 100);
        document.getElementById(`${p}-val`).innerText = `€${state[p].toLocaleString()}`;
        document.getElementById(`${p}-fill`).style.width = pct + '%';
        document.getElementById(`${p}-pct`).innerText = pct.toFixed(1) + '%';
        document.getElementById(`${p}-log`).innerHTML = state.logs.filter(l => l.user === p).slice(0, 5)
          .map(l => `<div class="log-entry">${l.time} <span>+€${l.amount}</span></div>`).join('');
      });
    }

    window.onload = init;
  </script>
</body>
</html>
