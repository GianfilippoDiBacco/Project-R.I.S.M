<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project RISM</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #111118; --border: #1e1e2e;
      --accent-g: #00e5a0; --accent-e: #ff5f6d;
      --text: #e8e8f0; --muted: #555570; --gold: #f5c542;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'DM Mono', monospace; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 48px 24px 80px; overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      opacity: 0.03; pointer-events: none; z-index: 10;
    }
    header { text-align: center; margin-bottom: 64px; position: relative; }
    .pre-title { font-size: 10px; letter-spacing: 0.8em; color: var(--muted); margin-bottom: 8px; text-indent: 0.8em; }
    h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(80px, 15vw, 120px); line-height: 0.9; letter-spacing: 4px; margin: 0; background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.1) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    #global-timer { font-size: 14px; color: var(--gold); margin-top: 16px; letter-spacing: 2px; text-transform: uppercase; }

    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 32px; width: 100%; max-width: 1000px; position: relative; }
    .card { background: var(--surface); border: 1px solid var(--border); padding: 40px; border-radius: 4px; position: relative; overflow: hidden; }
    .card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: var(--border); }
    .card.g-card::before { background: var(--accent-g); }
    .card.e-card::before { background: var(--accent-e); }

    h2 { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 2px; margin-bottom: 32px; }
    .val-display { font-size: 48px; font-weight: 500; margin-bottom: 8px; letter-spacing: -1px; }
    
    .prog-track { background: #000; height: 8px; border-radius: 4px; margin: 24px 0; overflow: hidden; border: 1px solid rgba(255,255,255,0.03); }
    .prog-fill { height: 100%; width: 0%; transition: width 1.5s cubic-bezier(0.19, 1, 0.22, 1); }
    .g-fill { background: var(--accent-g); box-shadow: 0 0 20px rgba(0,229,160,0.3); }
    .e-fill { background: var(--accent-e); box-shadow: 0 0 20px rgba(255,95,109,0.3); }

    .input-group { display: flex; gap: 8px; margin-top: 32px; }
    input { background: #000; border: 1px solid var(--border); color: #fff; padding: 12px 16px; font-family: inherit; font-size: 14px; width: 100%; outline: none; transition: border-color 0.2s; }
    input:focus { border-color: var(--muted); }
    .btn { background: var(--text); color: #000; border: none; padding: 0 24px; font-family: inherit; font-weight: 600; font-size: 12px; cursor: pointer; text-transform: uppercase; transition: transform 0.1s, opacity 0.2s; }
    .btn:active { transform: scale(0.96); }

    .log { margin-top: 32px; border-top: 1px solid var(--border); padding-top: 24px; height: 120px; overflow-y: auto; }
    .log-entry { font-size: 11px; color: var(--muted); margin-bottom: 8px; display: flex; justify-content: space-between; }
    .log-entry span { color: var(--text); }

    #reset-btn { margin-top: 80px; background: transparent; border: 1px solid #1a1a25; color: #333; padding: 8px 16px; font-family: inherit; font-size: 10px; cursor: pointer; letter-spacing: 2px; }
    #reset-btn:hover { color: var(--accent-e); border-color: var(--accent-e); }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

  <header>
    <div class="pre-title">COLLECTIVE CONTRIBUTION</div>
    <h1>RISM</h1>
    <div id="global-timer">OFFLINE MODE</div>
  </header>

  <div class="cards">
    <div class="card g-card">
      <h2 style="color:var(--accent-g)">CONTRIBUTOR: GIANFY</h2>
      <div id="gianfy-val" class="val-display">€0</div>
      <div class="prog-track"><div id="gianfy-fill" class="prog-fill g-fill"></div></div>
      <div style="display:flex; justify-content:space-between; font-size:12px; color:var(--muted)">
        <span>PROGRESS</span><span id="gianfy-pct">0%</span>
      </div>
      <div class="input-group">
        <input type="number" id="gianfy-input" placeholder="0.00">
        <button class="btn" onclick="addMoney('gianfy')">DEPOSIT</button>
      </div>
      <div id="gianfy-log" class="log"></div>
    </div>

    <div class="card e-card">
      <h2 style="color:var(--accent-e)">CONTRIBUTOR: EDO</h2>
      <div id="edo-val" class="val-display">€0</div>
      <div class="prog-track"><div id="edo-fill" class="prog-fill e-fill"></div></div>
      <div style="display:flex; justify-content:space-between; font-size:12px; color:var(--muted)">
        <span>PROGRESS</span><span id="edo-pct">0%</span>
      </div>
      <div class="input-group">
        <input type="number" id="edo-input" placeholder="0.00">
        <button class="btn" onclick="addMoney('edo')">DEPOSIT</button>
      </div>
      <div id="edo-log" class="log"></div>
    </div>
  </div>

  <button id="reset-btn" onclick="fullReset()">RESET SYSTEM ARCHIVE</button>

  <script>
    const SUPABASE_URL = 'https://qlbcxutceqeomxldliue.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFsYmN4dXRjZXFlb214bGRsaXVlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNDY3MTgsImV4cCI6MjA5MTgyMjcxOH0.5DBDrXqvRILPOI0y4LJuGkqRG6tkye0s-1_KGbYDxUE';
    
    const MAX = 10000;
    let sb, state = { gianfy: 0, edo: 0, logs: [], deadline: null };

    function refreshUI() {
      ['gianfy', 'edo'].forEach(p => {
        const val = state[p] || 0;
        const pct = Math.min((val / MAX) * 100, 100);
        document.getElementById(`${p}-val`).innerText = `€${val.toLocaleString('it-IT')}`;
        document.getElementById(`${p}-fill`).style.width = pct + '%';
        document.getElementById(`${p}-pct`).innerText = pct.toFixed(1) + '%';
        document.getElementById(`${p}-log`).innerHTML = state.logs.filter(l => l.user === p).slice(0, 8)
          .map(l => `<div class="log-entry"><span>+€${l.amount.toLocaleString('it-IT')}</span> ${l.time}</div>`).join('');
      });
    }

    function updateTimer() {
      const el = document.getElementById('global-timer');
      if (!state.deadline) { el.innerHTML = "SYSTEM READY / AWAITING DEPOSIT"; return; }
      const diff = state.deadline - Date.now();
      if (diff < 0) { el.innerHTML = "CHALLENGE COMPLETE"; return; }
      const d = Math.floor(diff / (1000 * 60 * 60 * 24));
      const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const m = Math.floor((diff / 1000 / 60) % 60);
      el.innerHTML = `T-MINUS: ${d}D ${h}H ${m}M`;
    }

    async function init() {
      try {
        sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const { data } = await sb.from('rng_state').select('data').eq('id', 'rism_global').single();
        if (data) { state = data.data; refreshUI(); }
        
        sb.channel('rism').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'rng_state', filter: 'id=eq.rism_global' }, payload => {
          state = payload.new.data; refreshUI();
        }).subscribe();
      } catch (e) { console.error("Cloud connection failed."); }
    }

    async function addMoney(p) {
      const input = document.getElementById(`${p}-input`);
      const val = parseInt(input.value);
      if (!val || val <= 0) return;
      if (!state.deadline) state.deadline = Date.now() + (6 * 30 * 24 * 60 * 60 * 1000);
      state[p] += val;
      state.logs.unshift({ user: p, amount: val, time: new Date().toLocaleTimeString('it-IT', {hour:'2-digit', minute:'2-digit'}) });
      refreshUI();
      input.value = '';
      await sb.from('rng_state').update({ data: state }).eq('id', 'rism_global');
    }

    async function fullReset() {
      if (prompt('Type "I want to reset" to confirm:') === "I want to reset") {
        state = { gianfy: 0, edo: 0, logs: [], deadline: null };
        refreshUI();
        await sb.from('rng_state').update({ data: state }).eq('id', 'rism_global');
      }
    }

    window.onload = () => { refreshUI(); init(); setInterval(updateTimer, 1000); };
  </script>
</body>
</html>
