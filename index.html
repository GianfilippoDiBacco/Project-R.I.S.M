<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project RISM | Final Version</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0a0a0f; --surface: #111118; --border: #1e1e2e; --accent-g: #00e5a0; --accent-e: #ff5f6d; --text: #e8e8f0; --muted: #555570; --gold: #f5c542; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 48px 24px; position: relative; }
    body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 999; opacity: 0.4; }
    header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 80px; letter-spacing: 0.08em; background: linear-gradient(135deg, #fff 30%, var(--muted)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; }
    #global-timer { text-align: center; margin-top: 10px; color: var(--gold); letter-spacing: 0.2em; text-transform: uppercase; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 32px; width: 100%; max-width: 900px; margin-top: 40px; }
    .card { background: var(--surface); border: 1px solid var(--border); padding: 36px 32px; position: relative; z-index: 10; }
    .card.gianfy::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--accent-g); }
    .card.edo::before    { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--accent-e); }
    .name { font-family: 'Bebas Neue', sans-serif; font-size: 36px; margin-bottom: 10px; }
    .amount-value { font-size: 32px; font-weight: 500; }
    .progress-wrap { background: var(--border); height: 10px; margin: 25px 0; overflow: hidden; }
    .progress-fill { height: 100%; width: 0%; transition: width 1.5s cubic-bezier(0.19, 1, 0.22, 1); }
    .card.gianfy .progress-fill { background: var(--accent-g); box-shadow: 0 0 15px var(--accent-g); }
    .card.edo    .progress-fill { background: var(--accent-e); box-shadow: 0 0 15px var(--accent-e); }
    .input-row { display: flex; gap: 10px; }
    .money-input { flex: 1; background: var(--bg); border: 1px solid var(--border); color: #fff; padding: 12px; font-family: inherit; font-size: 16px; outline: none; }
    .add-btn { background: transparent; border: 1px solid var(--border); color: #fff; padding: 0 20px; cursor: pointer; transition: 0.3s; }
    .add-btn:hover { background: #fff; color: #000; }
    
    .celebration { display: none; position: fixed; inset: 0; background: rgba(5, 5, 10, 0.98); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; text-align: center; }
    .celebration.active { display: flex; }
    .cel-name { font-family: 'Bebas Neue', sans-serif; font-size: 140px; line-height: 0.9; margin: 20px 0; text-shadow: 0 0 30px rgba(255,255,255,0.2); }
    
    #reset-trigger { margin-top: 100px; opacity: 0.1; font-size: 10px; cursor: pointer; border: none; background: none; color: white; }
    #reset-trigger:hover { opacity: 1; color: var(--accent-e); }
  </style>
</head>
<body>

<header>
  <h1>PROJECT RISM</h1>
  <div id="global-timer">LINKING TO DATABASE...</div>
</header>

<div class="cards">
  <div class="card gianfy">
    <div class="name" style="color:var(--accent-g)">GIANFY</div>
    <div class="amount-value" id="gianfy-val">€0</div>
    <div class="progress-wrap"><div class="progress-fill" id="gianfy-fill"></div></div>
    <div class="input-row"><input class="money-input" id="gianfy-input" type="number" placeholder="€..." /><button class="add-btn" onclick="addMoney('gianfy')">ADD</button></div>
  </div>
  <div class="card edo">
    <div class="name" style="color:var(--accent-e)">EDO</div>
    <div class="amount-value" id="edo-val">€0</div>
    <div class="progress-wrap"><div class="progress-fill" id="edo-fill"></div></div>
    <div class="input-row"><input class="money-input" id="edo-input" type="number" placeholder="€..." /><button class="add-btn" onclick="addMoney('edo')">ADD</button></div>
  </div>
</div>

<div class="celebration" id="celebration">
    <div style="color:var(--gold); letter-spacing:8px; font-size:14px;">CHALLENGE COMPLETE</div>
    <div class="cel-name" id="cel-name">WINNER</div>
    <div style="color:var(--text); opacity: 0.6; letter-spacing:2px;">SUDDEN DEATH VICTORY</div>
    <button id="reset-trigger" onclick="fullReset()">[ EMERGENCY REBOOT ]</button>
</div>

<button id="reset-trigger" onclick="fullReset()">RESET ALL DATA</button>

<script>
  const SUPABASE_URL = 'https://fiqihkihgsddxyxjbvrl.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpcWloa2loZ3NkZHh5eGpidnJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNjUyODYsImV4cCI6MjA5MTg0MTI4Nn0.MiitwN-yttsZX3d2IvvCzF2STM6ylZ3l7m5OvD9vJSU';
  
  const MAX = 10000;
  let sb, state = { gianfy: 0, edo: 0, logs: [], deadline: null, winner: null };

  async function init() {
    sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    // Attempt to load
    const { data } = await sb.from('rng_state').select('data').eq('id', 'rism_global').single();
    if (data) { 
        state = data.data; 
        refreshUI(); 
    }

    // Subscribe to live changes
    sb.channel('db_changes').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'rng_state' }, payload => {
        if (payload.new && payload.new.data) {
            state = payload.new.data;
            refreshUI();
        }
    }).subscribe();
  }

  function refreshUI() {
    // UI Update for Winner
    if (state.winner) {
        document.getElementById('cel-name').innerText = state.winner.toUpperCase();
        document.getElementById('cel-name').style.color = state.winner === 'gianfy' ? 'var(--accent-g)' : 'var(--accent-e)';
        document.getElementById('celebration').classList.add('active');
    } else {
        document.getElementById('celebration').classList.remove('active');
    }

    // Update Bars and Text
    ['gianfy', 'edo'].forEach(p => {
      const val = state[p] || 0;
      const pct = Math.min((val / MAX) * 100, 100);
      document.getElementById(`${p}-val`).innerText = `€${val.toLocaleString('it-IT')}`;
      document.getElementById(`${p}-fill`).style.width = pct + '%';
    });
  }

  async function addMoney(p) {
    if (state.winner) return;
    const input = document.getElementById(`${p}-input`);
    const val = parseInt(input.value);
    if (!val || val <= 0) return;
    
    // Set deadline only once
    if (!state.deadline) state.deadline = Date.now() + (180 * 24 * 60 * 60 * 1000);
    
    state[p] += val;
    if (state[p] >= MAX) {
        state[p] = MAX;
        state.winner = p;
    }

    // Update local UI first for speed
    refreshUI();
    input.value = '';
    
    // CRITICAL: Push to Cloud
    await sb.from('rng_state').update({ data: state }).eq('id', 'rism_global');
  }

  async function fullReset() {
    if (confirm("REBOOT SYSTEM? This clears all progress.")) {
        state = { gianfy: 0, edo: 0, logs: [], deadline: null, winner: null };
        refreshUI();
        await sb.from('rng_state').update({ data: state }).eq('id', 'rism_global');
    }
  }

  function updateTimer() {
    const el = document.getElementById('global-timer');
    if (state.winner) { el.innerHTML = "STATUS: CHALLENGE CONCLUDED"; return; }
    if (!state.deadline) { el.innerHTML = "SYSTEM READY: AWAITING INPUT"; return; }
    const diff = state.deadline - Date.now();
    const d = Math.floor(diff / (1000 * 60 * 60 * 24));
    el.innerHTML = `T-MINUS: ${Math.max(0, d)}D REMAINING`;
  }

  window.onload = () => { init(); setInterval(updateTimer, 1000); };
</script>
</body>
</html>
