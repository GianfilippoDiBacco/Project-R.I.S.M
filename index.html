<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project RISM</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #111118; --border: #1e1e2e;
      --accent-g: #00e5a0; --accent-e: #ff5f6d;
      --text: #e8e8f0; --muted: #555570; --gold: #f5c542;
    }
    body {
      background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace;
      min-height: 100vh; display: flex; flex-direction: column; align-items: center;
      padding: 48px 24px 80px; overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 999; opacity: 0.4;
    }
    header { text-align: center; margin-bottom: 64px; }
    header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 80px; letter-spacing: 0.08em; background: linear-gradient(135deg, #fff 30%, var(--muted)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    #global-timer { margin-top: 16px; font-size: 14px; color: var(--gold); letter-spacing: 0.2em; text-transform: uppercase; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 32px; width: 100%; max-width: 900px; }
    .card { background: var(--surface); border: 1px solid var(--border); padding: 36px 32px; position: relative; }
    .card.gianfy::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--accent-g); }
    .card.edo::before    { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--accent-e); }
    .name { font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: var(--text); }
    .amount-value { font-size: 28px; font-weight: 500; }
    .progress-wrap { background: var(--border); height: 8px; margin: 20px 0; overflow: hidden; }
    .progress-fill { height: 100%; width: 0%; transition: width 1s ease; }
    .card.gianfy .progress-fill { background: var(--accent-g); }
    .card.edo    .progress-fill { background: var(--accent-e); }
    .input-row { display: flex; gap: 8px; margin-top: 20px; }
    .money-input { flex: 1; background: var(--bg); border: 1px solid var(--border); color: #fff; padding: 10px; }
    .add-btn { background: transparent; border: 1px solid var(--border); color: #fff; padding: 10px 18px; cursor: pointer; }
    .log { max-height: 80px; overflow-y: auto; margin-top: 20px; font-size: 10px; color: var(--muted); border-top: 1px solid var(--border); }
    
    .celebration { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
    .celebration.active { display: flex; }
    #reset-btn { margin-top: 50px; background: transparent; border: 1px solid #333; color: #555; cursor: pointer; padding: 5px 10px; }
  </style>
</head>
<body>

<header>
  <h1>PROJECT RISM</h1>
  <div id="global-timer">SYNCHRONIZING...</div>
</header>

<div class="cards">
  <div class="card gianfy">
    <div class="name">GIANFY</div>
    <div class="amount-value" id="gianfy-val">€0</div>
    <div class="progress-wrap"><div class="progress-fill" id="gianfy-fill"></div></div>
    <div class="input-row">
      <input class="money-input" id="gianfy-input" type="number" placeholder="€..." />
      <button class="add-btn" onclick="addMoney('gianfy')">+ ADD</button>
    </div>
    <div class="log" id="gianfy-log"></div>
  </div>

  <div class="card edo">
    <div class="name">EDO</div>
    <div class="amount-value" id="edo-val">€0</div>
    <div class="progress-wrap"><div class="progress-fill" id="edo-fill"></div></div>
    <div class="input-row">
      <input class="money-input" id="edo-input" type="number" placeholder="€..." />
      <button class="add-btn" onclick="addMoney('edo')">+ ADD</button>
    </div>
    <div class="log" id="edo-log"></div>
  </div>
</div>

<div class="celebration" id="celebration">
    <h2 style="color:var(--gold); font-family:'Bebas Neue'; font-size:100px;" id="winner-name">WINNER</h2>
    <p style="color:#fff">TARGET REACHED</p>
    <button onclick="fullReset()" id="reset-btn">RESET ALL DATA</button>
</div>

<script>
  // YOUR SUPABASE KEYS
  const SUPABASE_URL = 'https://qlbcxutceqeomxldliue.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFsYmN4dXRjZXFlb214bGRsaXVlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNDY3MTgsImV4cCI6MjA5MTgyMjcxOH0.5DBDrXqvRILPOI0y4LJuGkqRG6tkye0s-1_KGbYDxUE';
  
  const MAX = 10000;
  let sb, state = { gianfy: 0, edo: 0, logs: [], deadline: null, winner: null };

  async function init() {
    sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const { data } = await sb.from('rng_state').select('data').eq('id', 'rism_global').single();
    if (data) { state = data.data; refreshUI(); }
    
    // Listen for live updates
    sb.channel('rism').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'rng_state', filter: 'id=eq.rism_global' }, payload => {
      state = payload.new.data; refreshUI();
    }).subscribe();
  }

  function refreshUI() {
    if (state.winner) {
        document.getElementById('winner-name').innerText = state.winner.toUpperCase();
        document.getElementById('celebration').classList.add('active');
    }
    ['gianfy', 'edo'].forEach(p => {
      const val = state[p] || 0;
      const pct = (val / MAX) * 100;
      document.getElementById(`${p}-val`).innerText = `€${val.toLocaleString('it-IT')}`;
      document.getElementById(`${p}-fill`).style.width = pct + '%';
      document.getElementById(`${p}-log`).innerHTML = state.logs.filter(l => l.user === p).slice(0, 5)
        .map(l => `<div>+€${l.amount} at ${l.time}</div>`).join('');
    });
  }

  async function addMoney(p) {
    if (state.winner) return;
    const input = document.getElementById(`${p}-input`);
    const val = parseInt(input.value);
    if (!val || val <= 0) return;
    
    if (!state.deadline) state.deadline = Date.now() + (6 * 30 * 24 * 60 * 60 * 1000);
    state[p] += val;
    state.logs.unshift({ user: p, amount: val, time: new Date().toLocaleTimeString() });
    
    if (state[p] >= MAX) state.winner = p;

    refreshUI();
    input.value = '';
    await sb.from('rng_state').update({ data: state }).eq('id', 'rism_global');
  }

  async function fullReset() {
    state = { gianfy: 0, edo: 0, logs: [], deadline: null, winner: null };
    refreshUI();
    document.getElementById('celebration').classList.remove('active');
    await sb.from('rng_state').update({ data: state }).eq('id', 'rism_global');
  }

  function updateTimer() {
    const el = document.getElementById('global-timer');
    if (state.winner) { el.innerHTML = "CHALLENGE COMPLETE"; return; }
    if (!state.deadline) { el.innerHTML = "AWAITING DEPOSIT"; return; }
    const diff = state.deadline - Date.now();
    const d = Math.floor(diff / (1000 * 60 * 60 * 24));
    el.innerHTML = `T-MINUS: ${d} DAYS REMAINING`;
  }

  window.onload = () => { init(); setInterval(updateTimer, 1000); };
</script>
</body>
</html>
