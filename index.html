<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project RISM</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #111118; --border: #1e1e2e;
      --accent-g: #00e5a0; --accent-e: #ff5f6d;
      --text: #e8e8f0; --muted: #555570; --gold: #f5c542;
    }
    body {
      background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace;
      min-height: 100vh; display: flex; flex-direction: column; align-items: center;
      padding: 48px 24px 80px; overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 999; opacity: 0.4;
    }
    header { text-align: center; margin-bottom: 64px; animation: fadeDown 0.7s ease both; }
    header h1 {
      font-family: 'Bebas Neue', sans-serif; font-size: clamp(56px, 10vw, 100px);
      letter-spacing: 0.08em; line-height: 1;
      background: linear-gradient(135deg, #fff 30%, var(--muted));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    #global-timer { margin-top: 16px; font-size: 14px; color: var(--gold); letter-spacing: 0.2em; text-transform: uppercase; }
    .divider { width: 60px; height: 2px; background: var(--border); margin: 0 auto 64px; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 32px; width: 100%; max-width: 900px; }
    .card { background: var(--surface); border: 1px solid var(--border); padding: 36px 32px; position: relative; overflow: hidden; animation: fadeUp 0.7s ease both; }
    .card.gianfy::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--accent-g); }
    .card.edo::before    { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--accent-e); }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 32px; }
    .name { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 0.06em; }
    .card.gianfy .name { color: var(--accent-g); } .card.edo .name { color: var(--accent-e); }
    .amount-value { font-size: 28px; font-weight: 500; }
    .progress-wrap { background: var(--border); height: 8px; margin-bottom: 28px; overflow: hidden; }
    .progress-fill { height: 100%; width: 0%; transition: width 1.2s cubic-bezier(0.22, 1, 0.36, 1); }
    .card.gianfy .progress-fill { background: var(--accent-g); box-shadow: 0 0 12px var(--accent-g); }
    .card.edo    .progress-fill { background: var(--accent-e); box-shadow: 0 0 12px var(--accent-e); }
    .input-row { display: flex; gap: 8px; }
    .money-input { flex: 1; background: var(--bg); border: 1px solid var(--border); color: #fff; padding: 10px 14px; font-family: inherit; }
    .add-btn { background: transparent; border: 1px solid var(--border); color: #fff; padding: 10px 18px; cursor: pointer; }
    .card.gianfy .add-btn:hover { background: var(--accent-g); color: #000; }
    .card.edo .add-btn:hover { background: var(--accent-e); color: #000; }
    .log { max-height: 80px; overflow-y: auto; margin-top: 24px; border-top: 1px solid var(--border); padding-top: 8px; }
    .log-entry { font-size: 10px; color: var(--muted); display: flex; justify-content: space-between; padding: 2px 0; }
    #reset-btn { margin-top: 80px; background: transparent; border: 1px solid #1a1a25; color: #333; padding: 8px 16px; cursor: pointer; font-size: 10px; }
    @keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; } }
  </style>
</head>
<body>

<header>
  <h1>PROJECT RISM</h1>
  <div id="global-timer">SYNCHRONIZING...</div>
</header>
<div class="divider"></div>

<div class="cards">
  <div class="card gianfy">
    <div class="card-header"><div class="name">GIANFY</div><div class="amount-value" id="gianfy-val">€0</div></div>
    <div class="progress-wrap"><div class="progress-fill" id="gianfy-fill"></div></div>
    <div id="gianfy-pct" style="font-size:10px; text-align:right; color:var(--muted); margin-bottom:10px;">0%</div>
    <div class="input-row">
      <input class="money-input" id="gianfy-input" type="number" placeholder="€ amount..." />
      <button class="add-btn" onclick="addMoney('gianfy')">+ ADD</button>
    </div>
    <div class="log" id="gianfy-log"></div>
  </div>
  <div class="card edo">
    <div class="card-header"><div class="name">EDO</div><div class="amount-value" id="edo-val">€0</div></div>
    <div class="progress-wrap"><div class="progress-fill" id="edo-fill"></div></div>
    <div id="edo-pct" style="font-size:10px; text-align:right; color:var(--muted); margin-bottom:10px;">0%</div>
    <div class="input-row">
      <input class="money-input" id="edo-input" type="number" placeholder="€ amount..." />
      <button class="add-btn" onclick="addMoney('edo')">+ ADD</button>
    </div>
    <div class="log" id="edo-log"></div>
  </div>
</div>

<button id="reset-btn" onclick="fullReset()">RESET SYSTEM ARCHIVE</button>

<script>
  // INSERT YOUR SUPABASE CREDENTIALS HERE
  const SUPABASE_URL = 'https://qlbcxutceqeomxldliue.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFsYmN4dXRjZXFlb214bGRsaXVlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNDY3MTgsImV4cCI6MjA5MTgyMjcxOH0.5DBDrXqvRILPOI0y4LJuGkqRG6tkye0s-1_KGbYDxUE';
  
  const MAX = 10000;
  let sb, state = { gianfy: 0, edo: 0, logs: [], deadline: null };

  async function init() {
    sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    // Load initial data from cloud
    const { data } = await sb.from('rng_state').select('data').eq('id', 'rism_global').single();
    if (data) { state = data.data; refreshUI(); }
    
    // Listen for live updates from other devices
    sb.channel('rism').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'rng_state', filter: 'id=eq.rism_global' }, payload => {
      state = payload.new.data; refreshUI();
    }).subscribe();
  }

  function refreshUI() {
    ['gianfy', 'edo'].forEach(p => {
      const val = state[p] || 0;
      const pct = (val / MAX) * 100;
      document.getElementById(`${p}-val`).innerText = `€${val.toLocaleString('it-IT')}`;
      document.getElementById(`${p}-fill`).style.width = pct + '%';
      document.getElementById(`${p}-pct`).innerText = pct.toFixed(1) + '%';
      document.getElementById(`${p}-log`).innerHTML = state.logs.filter(l => l.user === p).slice(0, 5)
        .map(l => `<div class="log-entry"><span>+€${l.amount}</span> ${l.time}</div>`).join('');
    });
  }

  async function addMoney(p) {
    const input = document.getElementById(`${p}-input`);
    const val = parseInt(input.value);
    if (!val || val <= 0) return;
    if (!state.deadline) state.deadline = Date.now() + (6 * 30 * 24 * 60 * 60 * 1000);
    state[p] += val;
    state.logs.unshift({ user: p, amount: val, time: new Date().toLocaleTimeString('it-IT', {hour:'2-digit', minute:'2-digit'}) });
    refreshUI();
    input.value = '';
    // Save to cloud
    await sb.from('rng_state').update({ data: state }).eq('id', 'rism_global');
  }

  async function fullReset() {
    if (prompt('Type "I want to reset" to confirm:') === "I want to reset") {
      state = { gianfy: 0, edo: 0, logs: [], deadline: null };
      refreshUI();
      await sb.from('rng_state').update({ data: state }).eq('id', 'rism_global');
    }
  }

  function updateTimer() {
    const el = document.getElementById('global-timer');
    if (!state.deadline) { el.innerHTML = "AWAITING DEPOSIT"; return; }
    const diff = state.deadline - Date.now();
    const d = Math.floor(diff / (1000 * 60 * 60 * 24));
    const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
    el.innerHTML = `T-MINUS: ${d}D ${h}H`;
  }

  window.onload = () => { init(); setInterval(updateTimer, 1000); };
</script>
</body>
</html>
